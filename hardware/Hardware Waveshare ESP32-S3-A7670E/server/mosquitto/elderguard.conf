# /etc/mosquitto/conf.d/elderguard.conf
# Mosquitto configuration for ElderGuard wearable project
# Copy to your VPS at iot.gtpc.com.br

# ============================================================================
# Listeners
# ============================================================================

# Standard MQTT (device connections via 4G or WiFi)
listener 1883
protocol mqtt

# WebSocket listener (for the nginx-proxied web dashboard)
listener 9001
protocol websockets

# ============================================================================
# Authentication
# ============================================================================

# Password file — create with: mosquitto_passwd -c /etc/mosquitto/passwd elderguard
allow_anonymous false
password_file /etc/mosquitto/passwd

# ACL — restrict topics per user
acl_file /etc/mosquitto/acl

# ============================================================================
# Persistence (so retained messages survive broker restarts)
# ============================================================================

persistence true
persistence_location /var/lib/mosquitto/
persistence_file elderguard.db
autosave_interval 300

# ============================================================================
# Logging
# ============================================================================

log_dest file /var/log/mosquitto/elderguard.log
log_type error
log_type warning
log_type notice
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ============================================================================
# Limits
# ============================================================================

max_inflight_messages 20
max_queued_messages 1000
message_size_limit 4096
