# /etc/nginx/sites-available/elderguard
# Nginx config for iot.gtpc.com.br
# Serves the web dashboard and proxies WebSocket to Mosquitto

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name iot.gtpc.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name iot.gtpc.com.br;

    # TLS — use Let's Encrypt or your own certs
    ssl_certificate     /etc/letsencrypt/live/iot.gtpc.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iot.gtpc.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # ---------------------------------------------------------------
    # Dashboard static files
    # ---------------------------------------------------------------
    root /var/www/elderguard;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------------------------------------------------------------
    # MQTT over WebSocket — proxy to Mosquitto port 9001
    # The dashboard connects to wss://iot.gtpc.com.br/mqtt
    # ---------------------------------------------------------------
    location /mqtt {
        proxy_pass http://127.0.0.1:9001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;  # Keep WS alive for 24h
        proxy_send_timeout 86400;
    }

    # ---------------------------------------------------------------
    # Optional: REST API endpoint (if you add a Node/Python backend)
    # ---------------------------------------------------------------
    # location /api/ {
    #     proxy_pass http://127.0.0.1:3000/;
    # }
}
