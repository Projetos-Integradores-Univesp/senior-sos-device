; PlatformIO project configuration for ElderGuard
; Use: pio run -t upload

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Monitor
monitor_speed = 115200

; Libraries
lib_deps =
    sparkfun/SparkFun BNO08x Cortex Based IMU@^1.1.0
    knolleary/PubSubClient@^2.8

; Board-specific build flags
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_MODE_OCT=1

; Partition scheme — use default 4MB if your board has 4MB flash,
; or "default_16MB.csv" for 16MB boards
board_build.partitions = default.csv
